<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Query — Temu Search Distiller</title>
  <style>
    :root {
      --ink: #0b0c10;
      --ink-2: #121319;
      --panel: #16181f;
      --panel-2: #1c1f28;
      --border: #262a35;
      --border-soft: #1f222b;
      --text: #ebecf0;
      --muted: #7d818f;
      --muted-2: #565a66;
      --signal: #ff7a3d;
      --signal-dim: #c9591f;
      --cyan: #5fd4d6;
      --mono: "SF Mono", "JetBrains Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 800px 500px at 50% -10%, rgba(255, 122, 61, 0.08), transparent),
        radial-gradient(ellipse 600px 400px at 90% 100%, rgba(95, 212, 214, 0.05), transparent),
        var(--ink);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      justify-content: center;
      padding: 56px 18px 80px;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 620px;
    }

    /* ---------- header ---------- */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-bottom: 14px;
    }

    .eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--signal);
      box-shadow: 0 0 0 3px rgba(255, 122, 61, 0.15);
    }

    h1 {
      font-size: 28px;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
      line-height: 1.2;
    }

    h1 span {
      color: var(--muted);
      font-weight: 450;
    }

    p.sub {
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.5;
      margin: 0 0 28px;
      max-width: 46ch;
    }

    /* ---------- input ---------- */
    .input-shell {
      position: relative;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-shell:focus-within {
      border-color: var(--signal-dim);
      box-shadow: 0 0 0 4px rgba(255, 122, 61, 0.08);
    }

    textarea {
      width: 100%;
      min-height: 88px;
      background: transparent;
      border: none;
      color: var(--text);
      padding: 16px 16px 50px;
      font-size: 15.5px;
      font-family: var(--sans);
      line-height: 1.5;
      resize: vertical;
    }

    textarea::placeholder {
      color: var(--muted-2);
    }

    textarea:focus {
      outline: none;
    }

    .input-bar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hint {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--muted-2);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    kbd {
      font-family: var(--mono);
      font-size: 10.5px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--muted);
    }

    button#go {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--signal);
      color: #1a0e06;
      border: none;
      border-radius: 9px;
      padding: 8px 14px;
      font-size: 13.5px;
      font-weight: 650;
      font-family: var(--sans);
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.1s ease;
    }

    button#go:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    button#go:active:not(:disabled) {
      transform: scale(0.97);
    }

    button#go:disabled {
      opacity: 0.45;
      cursor: default;
    }

    button#go svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ---------- distillation strip ---------- */
    #distill {
      margin-top: 18px;
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 30px;
    }

    #distill.active {
      display: flex;
    }

    .distill-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 2px;
    }

    .chip {
      font-family: var(--mono);
      font-size: 12.5px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--cyan);
      padding: 4px 10px;
      border-radius: 100px;
      opacity: 0;
      transform: translateY(4px) scale(0.95);
      animation: chipIn 0.35s ease forwards;
    }

    @keyframes chipIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ---------- status ---------- */
    #status {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--muted);
      min-height: 18px;
    }

    #status.error {
      color: #ff6b6b;
    }

    #status .spin {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ---------- results ---------- */
    #results {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 16px 16px 18px;
      text-decoration: none;
      color: var(--text);
      display: block;
      opacity: 0;
      transform: translateY(8px);
      animation: cardIn 0.4s ease forwards;
      transition: border-color 0.15s ease, background 0.15s ease;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--signal);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .card:hover {
      border-color: var(--signal-dim);
      background: var(--panel-2);
    }

    .card:hover::before {
      opacity: 1;
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card .query {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card .why {
      margin-top: 7px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .card .open {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--signal);
      font-weight: 600;
      font-family: var(--mono);
    }

    .card .open svg {
      width: 12px;
      height: 12px;
      transition: transform 0.15s ease;
    }

    .card:hover .open svg {
      transform: translate(2px, -2px);
    }

    .icon-arrow {
      width: 16px;
      height: 16px;
      color: var(--muted-2);
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* ---------- empty state ---------- */
    #empty {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: var(--muted-2);
      gap: 10px;
    }

    #empty svg {
      width: 28px;
      height: 28px;
      opacity: 0.5;
    }

    #empty p {
      font-size: 13px;
      margin: 0;
      max-width: 32ch;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="eyebrow"><span class="dot"></span>private tool · query distiller</div>
    <h1>Find it on Temu<span>, faster.</span></h1>
    <p class="sub">Describe what you're after in your own words. The model distills it into sharp, specific search
      strings and links straight into Temu's results.</p>

    <div class="input-shell">
      <textarea id="prompt" placeholder="e.g. a small quiet desk fan for a dorm room, not flimsy"></textarea>
      <div class="input-bar">
        <span class="hint"><kbd>⌘</kbd><kbd>↵</kbd> to run</span>
        <button id="go">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        Distill
      </button>
      </div>
    </div>

    <div id="distill"><span class="distill-label">extracting</span></div>
    <div id="status"></div>
    <div id="results"></div>

    <div id="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
        stroke-linejoin="round">
        <circle cx="11" cy="11" r="7" />
        <path d="M21 21l-4.3-4.3" />
      </svg>
      <p>Nothing distilled yet. Describe an item above and run it.</p>
    </div>

  </div>

  <script>
    const OPENROUTER_API_KEY = "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";
const MODEL = "nvidia/nemotron-3-nano-30b-a3b:free";

const promptEl = document.getElementById('prompt');
const goBtn = document.getElementById('go');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const distillEl = document.getElementById('distill');
const emptyEl = document.getElementById('empty');

const ICON_SPIN = `<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10"/></svg>`;
const ICON_ARROW = `<svg class="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>`;
const ICON_OPEN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>`;
const ICON_WARN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0"><path d="M12 9v4M12 17h.01M10.3 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0z"/></svg>`;

function temuUrl(query) {
  return "https://www.temu.com/search_result.html?search_key=" + encodeURIComponent(query);
}

function setStatus(html, isError) {
  statusEl.innerHTML = html;
  statusEl.className = isError ? "error" : "";
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// Pulls a few standout keywords from the raw prompt to animate as "extracted"
// tokens while the real request is in flight — purely a perceived-speed cue.
function quickKeywords(text) {
  const stop = new Set(["a","an","the","for","and","with","that","this","but","not","very","really","kind","sort","of","to","in","on","is","are","want","need","looking","find","me","my","please","some","like","just"]);
  return text
    .replace(/[^\w\s-]/g, " ")
    .split(/\s+/)
    .filter(w => w.length > 2 && !stop.has(w.toLowerCase()))
    .slice(0, 5);
}

async function animateDistill(text) {
  distillEl.innerHTML = '<span class="distill-label">extracting</span>';
  distillEl.classList.add('active');
  const words = quickKeywords(text);
  for (const w of words) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = w.toLowerCase();
    distillEl.appendChild(chip);
    await sleep(90);
  }
}

function renderResults(items) {
  emptyEl.style.display = 'none';
  resultsEl.innerHTML = "";
  items.forEach((item, i) => {
    const a = document.createElement('a');
    a.className = "card";
    a.style.animationDelay = (i * 70) + "ms";
    a.href = temuUrl(item.query);
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML = `
      <div class="card-top">
        <div>
          <div class="query">${item.query}</div>
          <div class="why">${item.why || ""}</div>
        </div>
        ${ICON_ARROW}
      </div>
      <div class="open">${ICON_OPEN} Open on Temu</div>
    `;
    resultsEl.appendChild(a);
  });
}

async function generateQueries(userPrompt) {
  const systemPrompt = `You are an expert at writing Temu marketplace search queries.
Given a description of what someone wants to buy, output 3 distinct, highly specific Temu search queries that would surface the best matching products.
Use concrete product nouns, key attributes (size, material, use-case, style), and avoid vague words.
Keep each query short (3-7 words), like an actual shopper would type into Temu's search bar.
Respond ONLY with valid JSON, no markdown, no preamble, in this exact format:
[{"query":"...","why":"..."},{"query":"...","why":"..."},{"query":"...","why":"..."}]
"why" is a short 5-12 word reason this query is a strong angle.`;

  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + OPENROUTER_API_KEY
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: userPrompt }
      ]
    })
  });

  if (response.status === 429) {
    let retryAfter = 5;
    try {
      const errJson = await response.json();
      retryAfter = errJson?.error?.metadata?.retry_after_seconds || 5;
    } catch (e) {}
    const err = new Error("Rate limited upstream. Retrying in " + Math.ceil(retryAfter) + "s…");
    err.isRateLimit = true;
    err.retryAfter = retryAfter;
    throw err;
  }

  if (!response.ok) {
    const errText = await response.text();
    throw new Error("API error " + response.status + ": " + errText);
  }

  const data = await response.json();
  const raw = data.choices?.[0]?.message?.content || "";
  const cleaned = raw.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(cleaned);
  if (!Array.isArray(parsed)) throw new Error("Unexpected response shape");
  return parsed;
}

async function handleGo() {
  const userPrompt = promptEl.value.trim();
  if (!userPrompt) {
    setStatus(ICON_WARN + " Type what you're looking for first.", true);
    return;
  }

  goBtn.disabled = true;
  resultsEl.innerHTML = "";
  setStatus(ICON_SPIN + " Distilling your request…");

  // Fire the real request and the perceived-speed animation in parallel.
  const animationPromise = animateDistill(userPrompt);
  const maxRetries = 2;
  let attempt = 0;

  while (attempt <= maxRetries) {
    try {
      const items = await generateQueries(userPrompt);
      await animationPromise;
      renderResults(items);
      setStatus(`Found ${items.length} search ${items.length === 1 ? 'angle' : 'angles'}.`);
      break;
    } catch (err) {
      if (err.isRateLimit && attempt < maxRetries) {
        setStatus(ICON_SPIN + " " + err.message);
        await sleep(Math.ceil(err.retryAfter) * 1000);
        attempt++;
        continue;
      }
      await animationPromise;
      setStatus(ICON_WARN + " " + (err.message || "Something went wrong."), true);
      break;
    }
  }

  distillEl.classList.remove('active');
  goBtn.disabled = false;
}

goBtn.addEventListener('click', handleGo);
promptEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    handleGo();
  }
});
  </script>
</body>

</html>
